name: ZAP Baseline Scan

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Juice Shop
        run: docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000 && break
            sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".zap/rules.tsv"
          allow_issue_writing: true
          # triage運用が固まるまではfalseに据え置く。ラチェット原則:
          # 何もtriageしていない生の状態でtrueにすると、直せる材料が無いまま毎回赤くなるだけになる。
          # ゲート化（true）に戻すのは、実プロダクト向けの判断基準（docs/risk-judgment-criteria-draft.md）を
          # 固めてrules.tsvで既知の指摘を抑制した後にする。
          fail_action: false
          artifact_name: "zap_scan_report"
